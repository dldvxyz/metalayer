# `bun lefthook install` to activate
# `bun lefthook uninstall` to deactivate

pre-commit:
  piped: true
  jobs:
    - name: Lint and format
      glob:
        - "*.ts"
        - "*.{json,jsonc}"
      run: bun lint-n-fix {staged_files}
      stage-fixed: true

    - name: Run tests
      run: bun run test

    - name: Build the app
      run: bun run build
